server {
  listen 80;

  location /api/ {
    # "helloworld-svc" est le nom du Service k8s du module API, résolu via
    # le DNS interne du namespace -- identique sur dev/rec/preprod/prod,
    # donc pas besoin de configuration par stage. Le slash final sur
    # location et proxy_pass fait que nginx retire le préfixe "/api/" avant
    # de transmettre la requête (ex. /api/hello/Bob -> /hello/Bob).
    proxy_pass http://helloworld-svc/;
  }

  location / {
    root /usr/share/nginx/html;
    index index.html;
  }
}
